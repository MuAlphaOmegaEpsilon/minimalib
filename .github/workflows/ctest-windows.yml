name: ctest-windows
on:
  push:
    paths:
      - '.github/workflows/ctest-windows.yml'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - '**.s'
      - '**.hpp'
      - '**.cpp'

jobs:
  tests:
    name: ctest-windows
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2019]
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install Ninja
        run: choco install ninja
      - name: Build tests
        run: |
          cmake -B build -S .tests -G Ninja -DCMAKE_SYSTEM_NAME="Generic" -DCMAKE_CXX_COMPILER="C:/Program Files/LLVM/bin/clang++.exe" -DCMAKE_ASM_COMPILER="C:/Program Files/LLVM/bin/clang++.exe" -DCMAKE_ASM_COMPILER_ID="Clang" -DCMAKE_CXX_COMPILER_ID="Clang"
          cmake --build build
      - name: Run tests
        run: |
          cd build
          ctest --timeout 1 --output-on-failure
