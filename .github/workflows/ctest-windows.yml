name: ctest-windows
on:
  push:
    paths:
      - '.github/workflows/ctest-windows.yml'
      - '**/CMakeLists.txt'
      - '**.cmake'
      - '**.s'
      - '**.hpp'
      - '**.cpp'

jobs:
  tests:
    name: ctest-windows
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2019]
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      # - name: Cache LLVM and Clang
        # id: cache-llvm
        # uses: actions/cache@v2
        # with:
          # path: |
            # C:/Program Files/LLVM
            # ./llvm
          # key: llvm-12
      # - name: Install LLVM and Clang
        # uses: KyleMayes/install-llvm-action@v1.4.1
        # with:
          # version: "12.0"
          # cached: ${{ steps.cache-llvm.outputs.cache-hit }}
      - name: Build tests
        run: |
          cmake -B build -S .tests -DCMAKE_CXX_COMPILER=clang
          cmake --build build
      - name: Run tests
        run: |
          cd build
          ctest --timeout 1 --output-on-failure
